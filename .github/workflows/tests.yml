name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: food_ordering_test
          POSTGRES_USER: food_user
          POSTGRES_PASSWORD: food_pass123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests
        run: |
          cd backend
          python manage.py test users menu orders admin_dashboard --verbosity=2
        env:
          DB_ENGINE: django.db.backends.postgresql
          DB_NAME: food_ordering_test
          DB_USER: food_user
          DB_PASSWORD: food_pass123
          DB_HOST: localhost
          DB_PORT: "5432"
          SECRET_KEY: test-secret-key-not-for-production
          DEBUG: "False"
